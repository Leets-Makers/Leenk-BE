spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    mongodb:
      uri: ${LOCAL_MONGODB_URI}
      database: ${LOCAL_MONGODB_DB_NAME}

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  cloud:
    aws:
      credentials:
        access-key: ${LOCAL_AWS_ACCESS_KEY}
        secret-key: ${LOCAL_AWS_SECRET_KEY}
      region:
        static: ap-northeast-2

auth:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRATION}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION}
  oauth2:
    client-id: ${CLIENT_ID}
    client-secret: ${CLIENT_SECRET}
    oauth-iss: ${OAUTH_ISS}
    oauth-server-token-uri: ${OAUTH_SERVER_TOKEN_URI}
    oauth-jwk-set-uri: ${OAUTH_JWK_SET_URI}
    oauth-server-user-info-uri: ${OAUTH_SERVER_USER_INFO_URI}
    kakao:
      kakao_grant_type: ${KAKAO_GRANT_TYPE}
      kakao_grant_type_name: ${KAKAO_GRANT_TYPE_NAME}
    apple:
      apple_grant_type: ${APPLE_GRANT_TYPE}
      apple_grant_type_name: ${APPLE_GRANT_TYPE_NAME}
      client_id: ${APPLE_CLIENT_ID}
      team_id: ${APPLE_TEAM_ID}
      key_id: ${APPLE_KEY_ID}
      redirect_uri: ${APPLE_REDIRECT_URI}
      token_uri: https://appleid.apple.com/auth/token
      keys_uri: https://appleid.apple.com/auth/keys
      private_key_path: ${APPLE_PRIVATE_KEY_PATH}
      allowed_audiences: ${APPLE_CLIENT_ID},${APPLE_ALLOWED_AUDIENCES}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME}
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region:
      static: ap-northeast-2

myapp:
  sqs:
    queue_name: ${LOCAL_AWS_SQS_QUEUE_NAME}
    queue_url: ${LOCAL_AWS_SQS_QUEUE_URL}
    resize_queue_url: ${RESIZE_SQS_QUEUE_URL}
    messageDelaySecs: 0
