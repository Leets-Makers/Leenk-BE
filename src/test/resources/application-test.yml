spring:
  autoconfigure:
    exclude:
      # AWS 관련 AutoConfiguration 제외
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
      - io.awspring.cloud.autoconfigure.sqs.SqsAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.AwsAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.CredentialsProviderAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.RegionProviderAutoConfiguration
  data:
    mongodb:
      # TestContainers @ServiceConnection이 자동으로 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2

notion:
  token: test-notion-token
  feedback_database_id: test-feedback-id
  report_database_id: test-report-id
  report_database_leenk_id: test-report-leenk-id
  version: test-version

slack:
  webhook_url: https://hooks.slack.com/test

token:
  access_token: test-access-token
  refresh_token: test-refresh-token
  password: test-password

auth:
  jwt:
    secret: test-jwt-secret-key-for-testing-minimum-256-bits
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
  oauth2:
    client-id: test-client-id
    client-secret: test-client-secret
    oauth-iss: https://test.oauth.com
    oauth-server-token-uri: https://test.oauth.com/token
    oauth-jwk-set-uri: https://test.oauth.com/jwks
    oauth-server-user-info-uri: https://test.oauth.com/userinfo
    kakao:
      kakao_grant_type: test
      kakao_grant_type_name: test
    apple:
      client-id: test-apple-client-id
      team_id: test-team-id
      key_id: test-key-id
      redirect_uri: https://test.redirect.com
      token_uri: https://appleid.apple.com/auth/token
      keys_uri: https://appleid.apple.com/auth/keys
      private_key_path: test-key.p8
      allowed_audiences: test-audience
      apple_grant_type: test
      apple_grant_type_name: test

cloud:
  aws:
    s3:
      bucket: test-bucket
    credentials:
      access-key: test
      secret-key: test
    region:
      static: ap-northeast-2

myapp:
  sqs:
    queue_name: test-queue
    queue_url: https://sqs.ap-northeast-2.amazonaws.com/test/test-queue
    resize_queue_url: https://sqs.ap-northeast-2.amazonaws.com/test/test-resize-queue
    messageDelaySecs: 0
